
# RSS聚合器配置文件
sources:
  - name: "淘股吧博客-米开朗"
    url: "http://localhost:1200/taoguba/blog/11056656"
    category: "股票"
    priority: 1
    enabled: true
  - name: "淘股吧博客-韭师"
    url: "http://localhost:1200/taoguba/blog/7737030"
    category: "股票"
    priority: 1
    enabled: true

filtering:
  keywords:
    include: ["股票", "股市", "A股", "港股", "美股", "基金", "投资", "证券", "理财", "金融", "股评", "复盘", "趋势", "量化", "操盘", "交易", "板块", "龙头", "涨停", "跌停", "主力", "庄家", "散户", "筹码", "K线", "MACD", "均线", "支撑", "压力", "突破", "回踩", "追涨", "杀跌", "题材", "概念"]
    exclude: ["广告", "推广", "招聘", "活动", "招聘"]
  min_relevance_score: 0.1  # 降低相关性评分要求，以便获取更多文章
  max_age_hours: 168  # 改为168小时（一周），以便获取更多有价值的近期文章

output:
  format: "markdown"  # json, markdown
  max_articles: 50
  include_full_content: false

caching:
  enabled: false
  retention_days: 7
  cache_file: ".rss_cache.json"

request:
  timeout: 10
  retry_attempts: 3
  delay_between_requests: 1